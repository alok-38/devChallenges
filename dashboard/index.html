<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Dashboard Landing Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="navbar">
      <h1 class="logo gradient-text">DashUI</h1>
      <!-- Hamburger -->
      <button class="hamburger" id="hamburger">☰</button>

      <nav id="nav-menu">
        <a href="#">Home</a>
        <a href="#">Features</a>
        <a href="#">Pricing</a>
      </nav>
    </header>

    <section class="hero">
      <h2>Build Modern Interfaces</h2>
      <p>Clean, responsive and beautiful UI using pure CSS.</p>
      <button id="cta-btn">Get Started</button>
      <!-- Auth Modal -->
      <div class="modal" id="auth-modal">
        <div class="modal-content glass">
          <span class="close" id="close-modal">&times;</span>

          <h2 id="form-title">Create Account</h2>

          <form id="auth-form">
            <input type="email" id="email" placeholder="Email" required />
            <input
              type="password"
              id="password"
              placeholder="Password"
              required
            />
            <button type="submit">Continue</button>
          </form>

          <p id="toggle-text">
            Already have an account? <span id="toggle-mode">Login</span>
          </p>

          <p class="error" id="error-msg"></p>
        </div>
      </div>
    </section>

    <section class="cards grid">
      <div class="card glass">
        <h3>Fast</h3>
        <p>Optimized layouts using CSS Grid.</p>
      </div>
      <div class="card glass">
        <h3>Responsive</h3>
        <p>Looks great on all devices.</p>
      </div>
      <div class="card glass">
        <h3>Modern</h3>
        <p>Uses latest CSS features.</p>
      </div>
    </section>
    <footer>
      <p>&copy; No rights reserved</p>
    </footer>
    <script>
      const hamburger = document.getElementById("hamburger");
      const navMenu = document.getElementById("nav-menu");
      const navLinks = document.querySelectorAll("a");

      hamburger.addEventListener("click", () => {
        navMenu.classList.toggle("active");
        navMenu.style.display = "flex";
        navMenu.style.flexDirection = "column";
        navLinks.forEach((link) => {
          link.style.marginBottom = "1rem";
        });
      });
    </script>
    <script src="modal.js" defer></script>
  </body>
</html>
